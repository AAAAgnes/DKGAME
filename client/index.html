<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 천기누설: 럭키-보살 - 당신의 운명을 점치세요 🔮</title> 
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <style>
        /* 🚨 [90년대 샤머니즘 컨셉] CSS 리뉴얼 - 세련됨을 버려라 🚨 */

        *, *::before, *::after {
            box-sizing: border-box;
        }

        /* 👻 기본 배경: 칙칙한 네이비 & 촌스러운 굴림체 */
        body { 
            font-family: 'Gulim', '굴림', 'AppleGothic', sans-serif; /* 무조건 굴림 */
            text-align: center; 
            margin: 0;
            padding-top: 20px;
            /* 90년대 웹사이트 특유의 패턴 배경 느낌 */
            background-color: #000080; /* 진네이비 */
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIklEQVQIW2NkQAKrVq36z8gAFWNgYGSA8mGCYAtAhMECALw4CgpVf7mMAAAAAElFTkSuQmCC'); 
            color: #ffffff; 
            overflow-x: hidden;
            width: 100%; 
        }

        /* 🌟 [필살기 1] 무지개 텍스트 효과 (Marquee 스타일) */
        @keyframes rainbow {
            0% { color: #ff0000; }
            16% { color: #ffff00; }
            33% { color: #00ff00; }
            50% { color: #00ffff; }
            66% { color: #0000ff; }
            83% { color: #ff00ff; }
            100% { color: #ff0000; }
        }

        h1, h2, h3 {
            font-family: 'Batang', '바탕', serif; /* 제목은 투박한 바탕체 */
            font-weight: bold;
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000; /* 글자 테두리 */
        }

        /* 메인 타이틀 효과 */
        #game-container h1, #lobby-container h2 {
            font-size: 36px;
            animation: rainbow 2s infinite linear; /* 무지개 애니메이션 */
            letter-spacing: -2px;
        }

        /* 시스템 색상 클래스 재정의 (샤머니즘 버전) */
        .sys-main { color: #FFFF00 !important; text-shadow: 0 0 5px #FFFF00; } /* 황금색 (신비) */
        .sys-approve { color: #00FF00 !important; text-shadow: 0 0 5px #00FF00; } /* 형광 초록 (길조) */
        .sys-reject { color: #FF0000 !important; text-shadow: 0 0 10px #FF0000; } /* 생빨강 (흉조/경고) */

        /* 🔒 로비/로그인 컨테이너 -> "수련장 입장" */
        #lobby-container { 
            background-color: #c0c0c0; /* 윈도우 95 회색 */
            padding: 20px;
            border-radius: 0; /* 둥근 거 금지 */
            border-top: 3px solid #ffffff;
            border-left: 3px solid #ffffff;
            border-right: 3px solid #000000;
            border-bottom: 3px solid #000000;
            width: 350px;
            margin: 50px auto; 
            color: #000000;
        }

        /* 로그인 타이틀 */
        #lobby-container h2 {
            font-size: 22px;
            margin-top: 0;
            color: #000080;
            animation: none;
            text-shadow: none;
        }

        /* 🖊️ 입력 필드: 투박하고 각진 스타일 */
        input[type="text"], input[type="password"] { 
            padding: 5px;
            margin: 5px 0; 
            width: 95%; 
            border-top: 2px solid #000000;
            border-left: 2px solid #000000;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            background-color: #ffffff;
            font-family: 'Gulim', sans-serif;
            font-size: 14px; 
        }
        input[type="text"]:focus, input[type="password"]:focus {
            outline: 2px solid #FF00FF; /* 형광 핫핑크 포커스 */
        }

        /* 🚀 [필살기 2] 조악한 그라데이션 버튼 (HTML 전송 버튼 스타일) */
        #join-button, #chat-send-button { 
            padding: 8px 20px; 
            /* 촌스러운 파란 그라데이션 */
            background: linear-gradient(to bottom, #1e88e5 0%, #1565c0 100%);
            color: white; 
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #000000;
            border-bottom: 2px solid #000000;
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            font-family: 'Batang', serif;
            margin-top: 15px; 
            text-shadow: 1px 1px 0 #000;
        }
        #join-button:hover, #chat-send-button:hover { 
            background: linear-gradient(to bottom, #1565c0 0%, #1e88e5 100%); /* 그라데이션 반전 */
        }

        /* 게임(시스템) 스타일 */
        #game-container { 
            display: none; 
            max-width: 1000px; 
            margin: 0 auto; 
            padding: 0 10px; 
        } 

        /* 전광판 느낌 */
        #score-board { 
            margin-top: 10px; 
            font-size: 16px; 
            font-weight: bold; 
            color: #00FF00; /* 형광 초록 */
            background-color: #000000;
            padding: 10px;
            border: 2px solid #c0c0c0;
            font-family: 'Courier New', monospace; /* 고정폭 폰트 */
        }

        /* 상단 메시지 */
        #message { 
            font-size: 18px; 
            color: #FFFF00; 
            padding: 10px; 
            font-weight: bold; 
            border-bottom: 3px double #FF0000; /* 빨간 이중선 */
            margin-bottom: 15px;
        }
        
        /* 🃏 [핵심] 카드 -> "부적" 디자인 */
        #hand-container, #table-cards-list { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin-top: 20px; 
            flex-wrap: wrap;
        }

        .card {
            width: 200px;
            height: 280px; /* 세로로 긴 부적 형태 */
            /* ☠️ 황천길 그라데이션 (지옥맛) */
            background: linear-gradient(135deg, #ffecb3 0%, #ffcc80 50%, #ffab91 100%);
            border: 4px solid #FF0000; /* 굵은 빨간 테두리 */
            border-radius: 0;
            padding: 15px;
            box-shadow: 5px 5px 0 rgba(0,0,0,0.5); /* 투박한 그림자 */
            text-align: center; 
            cursor: pointer;
            transition: all 0.1s;
            position: relative;
            overflow: hidden;
        }

        /* 카드 노이즈 효과 (조악함 추가) */
        .card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIklEQVQIW2NkQAKrVq36z8gAFWNgYGSA8mGCYAtAhMECALw4CgpVf7mMAAAAAElFTkSuQmCC');
            opacity: 0.2;
            pointer-events: none;
        }

        /* 부적 호버 효과: 기(氣)가 모인다! */
        .card:hover { 
            transform: scale(1.05);
            border-color: #FFFF00; /* 황금색 테두리로 변경 */
            box-shadow: 0 0 15px #FFFF00; /* 황금빛 네온 효과 */
        }

        /* 카드 내용 */
        .card-name { 
            font-family: 'Batang', serif;
            font-weight: bold; 
            font-size: 20px; 
            color: #000000 !important; /* 부적 안 글씨는 검정 */
            text-shadow: none;
            margin-top: 20px;
            line-height: 1.2;
        }

        /* 카드 타입 (흉조/길조 설명) */
        .card-type { 
            font-size: 13px; 
            color: #444; 
            border-top: 1px solid #FF0000; 
            padding-top: 10px; 
            margin-top: auto;
            position: absolute;
            bottom: 15px;
            left: 15px;
            right: 15px;
        } 

        /* 👹 보살 액션 영역 (반전 영역) */
        #bl-god-actions {
            background-color: #FF0000; /* 공포의 빨강 배경 */
            color: #ffffff;
            padding: 15px;
            border: 3px solid #FFFF00;
            margin-bottom: 25px; 
        }
        #bl-god-actions h3 { animation: rainbow 1s infinite linear; }

        /* 승인/반려 버튼 (보살 버전) */
        .action-btn {
            padding: 10px 20px;
            border-radius: 0;
            font-size: 16px;
            font-weight: bold;
            font-family: 'Batang', serif;
            margin: 10px;
            cursor: pointer;
            text-shadow: 1px 1px 0 #000;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #000000;
            border-bottom: 2px solid #000000;
        }
        
        /* 대영 버튼 (길조) */
        #play-as-gong { background-color: #008000; color: #ffffff; } /* 칙칙한 초록 */
        /* 리쿠 버튼 (흉조) */
        #play-as-su { background-color: #800000; color: #ffffff; } /* 칙칙한 핏빛 빨강 */
        
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 3px 3px 0 rgba(0,0,0,0.8);
        }


        /* 🔮 [필살기 3] 시스템 보드 (황금 비단 느낌) */
        #table-container { 
            min-height: 150px; 
            margin-top: 30px; 
            border: 4px solid #FFFF00; /* 황금색 테두리 */
            padding: 20px;
            background-color: #800080; /* 보라색 비단 */
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIklEQVQIW2NkQAKrVq36z8gAFWNgYGSA8mGCYAtAhMECALw4CgpVf7mMAAAAAElFTkSuQmCC');
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }
        #table-container h3 { color: #FFFF00; }


        /* 🔔 알림/메시지 보드 (지옥 메신저) */
        #chat-container {
            border: 2px solid #c0c0c0;
            border-radius: 0; 
            background-color: #000000; /* 검은 배경 */
            width: 100%; 
            max-width: 450px; 
            height: 30vh; 
            display: flex; 
            flex-direction: column;
            overflow: hidden;
            margin: 20px auto; 
            font-family: 'Gulim', sans-serif;
        }

        /* 채팅 헤더 (반짝이 효과 대상) */
        #chat-header {
            padding: 8px;
            font-weight: bold;
            background: linear-gradient(to right, #800000 0%, #ff0000 50%, #800000 100%); /* 핏빛 그라데이션 */
            border-bottom: 2px solid #c0c0c0;
            color: #ffffff;
            text-shadow: 1px 1px 0 #000;
        }

        #chat-messages {
            flex-grow: 1; 
            padding: 10px;
            overflow-y: auto;
            text-align: left;
            color: #00FF00; /* 기본 형광 초록 텍스트 */
            font-size: 13px;
        }
        /* 시스템 메시지는 노랗게 반짝이게 */
        .chat-message.system-message { 
            color: #FFFF00; 
            font-weight: bold;
            animation: rainbow 3s infinite linear;
        }

        #chat-input-area {
            display: flex;
            border-top: 2px solid #c0c0c0;
            padding: 5px;
            background-color: #c0c0c0;
        }

        #chat-input {
            flex-grow: 1;
            padding: 3px;
            border-top: 2px solid #000000;
            border-left: 2px solid #000000;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            background-color: #ffffff;
            margin-right: 5px;
            font-size: 13px;
            color: #000;
        }

        /* 채팅 전송 버튼 (#join-button 스타일 상속) */
        #chat-send-button {
            padding: 3px 10px;
            margin-top: 0;
            font-size: 13px;
        }
        
        /* 👥 중생(접속자) 목록 */
        #player-list-ul {
            list-style-type: none;
            padding: 10px;
            margin-top: 15px;
            background-color: #000000;
            border: 1px solid #c0c0c0;
            display: flex; 
            justify-content: center;
            gap: 10px;
            font-size: 12px;
            flex-wrap: wrap;
        }
        #player-list-ul li {
            padding: 2px 8px;
            border: 1px solid #00FF00;
            background-color: #004000;
            color: #00FF00;
        }

        /* 닉네임 강조 (주술적 색상) */
        .player-nickname{
            color: #FF00FF; /* 형광 핫핑크 */
            font-weight: bold;
        }


        /* 📱 미디어 쿼리 - 모바일 대응 (조악함 유지) */
        @media (max-width: 768px) {
            h1 { font-size: 28px !important; }
            #lobby-container {
                 width: 95%;
                 margin: 20px auto;
            }
            .card {
                 width: 140px; /* 모바일에선 좀 더 작게 */
                 height: 200px;
                 padding: 10px;
            }
            .card-name { font-size: 16px; margin-top: 10px;}
            #chat-container {
                height: 50vh; 
                max-width: 95%;
            }
            #player-list-ul {
                flex-direction: row;
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <div id="lobby-container">
        <h2>
            🔮 <span class="sys-main">천기누설</span> 🔮
            <br>
            <span style="font-size: 16px;">- 내부 수련 시스템 -</span> 
        </h2> 
        <div id="lobby-status" style="color: #FF0000; margin-bottom: 15px; font-weight:bold;"></div>
        <input type="text" id="nickname-input" placeholder="중생의 이름">
        <input type="password" id="password-input" placeholder="천기누설">
        <button id="join-button">수련장 입장</button>
        <div style="margin-top: 20px; font-size: 12px; color: #444; background:#ffecb3; padding:5px; border:1px solid #000;">
            ⚠️ 암호가 틀리면 일반 중생으로 강제 접속됩니다.
            
        </div>
    </div>
    
    <div id="game-container">
        <h1>
            🔮 <span class="sys-main">운명 공동체</span> 전자 복채 시스템 🔮
        </h1> 
        <div id="status"></div>
        <div id="message">지금 담당자의 천기누설 차례이니라...</div>
        
        <div id="score-board">
            복채 번호: JAERI-2026-<span id="round-count">777</span> <br>
            현재 운명 담당자: <span id="bl-god-name">김</span> 보살
        </div>
        
        <div id="bl-god-actions" style="margin-bottom: 25px; display: none;">
            <h3 id="card-to-play-name">선택된 운명: (없음)</h3>
            <button id="play-as-gong" class="action-btn">☯️ 양이로다</button>
            <button id="play-as-su" class="action-btn">☠️ 음이로다</button>
        </div>

        <div id="table-container">
            <h3 style="margin-top: 0;">🔮 심판을 기다리는 운명들 🔮</h3>
            <span id="table-cards-count">3</span>개의 운명이 대기중
            <div id="table-cards-list">
                </div>
        </div>

        <h2 id="my-hand-title" style="margin-top: 40px; color: #FFFF00;">☯️ 그대의 품에 깃든 운명</h2>
        <div id="hand-container">
            </div>
        
        <div id="chat-container">
            <div id="chat-header">🔔 중생들의 외침 🔔</div>
            <div id="chat-messages">
                <div class="chat-message system-message">수련장에 입장하셨습니다...</div>
                <div class="chat-message system-message">바른 말, 고운 말을 쓰지 않으면 살(煞)을 맞으리라.</div>
            </div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="살풀이 할 것이 있소?" maxlength="200">
                <button id="chat-send-button">↑</button>
            </div>
        </div>

        <ul id="player-list-ul">
            <li>(접속한 중생들 목록)</li>
        </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
